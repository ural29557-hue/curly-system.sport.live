
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СПОРТ.LIVE | Прямые трансляции</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0b0e14; color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #1e2530; padding: 15px; border-bottom: 2px solid #e01e37; text-align: center; }
        .logo { font-weight: 800; font-size: 24px; text-transform: uppercase; margin-bottom: 10px; }
        .logo span { color: #e01e37; }
        
        .match-selector { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .match-btn { background: #232936; color: #fff; border: 1px solid #384256; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .match-btn:hover { background: #2f3749; }
        .match-btn.active { background: #e01e37; border-color: #e01e37; }

        .container { display: flex; flex: 1; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .video-column { flex: 3; display: flex; flex-direction: column; gap: 15px; }
        .video-box { aspect-ratio: 16 / 9; background: #000; border-radius: 8px; overflow: hidden; }
        #player { width: 100%; height: 100%; border: none; }

        /* Кнопки Донат и Канал */
        .controls-panel { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 6px; text-decoration: none; color: #fff; font-weight: 700; font-size: 14px; text-align: center; transition: 0.3s; flex: 1; min-width: 200px; }
        .btn-donate { background: #e01e37; }
        .btn-donate:hover { background: #c0182e; }
        .btn-channel { background: #0088cc; }
        .btn-channel:hover { background: #006699; }

        .chat-box { flex: 1; min-width: 300px; height: 550px; background: #131722; border-radius: 8px; overflow: hidden; border: 1px solid #232936; }
        #chatIframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 800px) { 
            .container { flex-direction: column; } 
            .chat-box { height: 400px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">СПОРТ<span>.LIVE</span></div>
        <div class="match-selector">
            <!-- Кнопки переключения. При клике вызывается функция switchMatch с номером матча -->
            <button class="match-btn active" onclick="switchMatch(1)">МАТЧ 1 (Испания - Аргентина) ФИНАЛ</button>
            <button class="match-btn" onclick="switchMatch(2)">МАТЧ 2  </button>
            <button class="match-btn" onclick="switchMatch(3)">МАТЧ 3 </button>
            <button class="match-btn" onclick="switchMatch(4)">МАТЧ 4 </button>
            <button class="match-btn" onclick="switchMatch(5)">МАТЧ 5</button>
            <button class="match-btn" onclick="switchMatch(6)">МАТЧ 6</button>
        </div>
    </header>

    <div class="container">
        <section class="video-column">
            <div class="video-box">
                <!-- Сюда загружается плеер выбранного матча -->
                <iframe id="player" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div class="controls-panel">
                <!-- Ссылки на донат и телеграм (замените на свои) -->
                <a href="https://www.donationalerts.com/" target="_blank" class="btn btn-donate">💰 ПОДДЕРЖАТЬ СТРИМ (ДОНАТ)</a>
                <a href="https://t.me/tyty67676767" target="_blank" class="btn btn-channel">📢  ПОДПИСАТЬСЯ НА ТГ-КАНАЛ</a>

</div>
        </section>
        
        <section class="chat-box">
            <!-- Сюда загружается чат выбра

нного матча -->
            <iframe id="chatIframe" src=""></iframe>
        </section>
    </div>

    <script>
        // 1. СЮДА ВСТАВЬТЕ ССЫЛКИ НА ВАШИ ТРАНСЛЯЦИИ (вместо существующих примеров)
        const streams = {
            1: "https://rutube.ru/play/embed/8edffdac147423499136c2ceb6e44d36/", // Ссылка для Матча 1
            2: "", // Ссылка для Матча 2
            3: "",   // Ссылка для Матча 3
            4: "", // Ссылка для Матча 4
            5: "", // Ссылка для Матча 5
            6: ""  // Ссылка для Матча 6
        };

        // 2. СЮДА ВСТАВЬТЕ ССЫЛКИ НА СВОИ ЧАТЫ
        // Если чатов нет, можно вставить один общий чат (например, виджет чата DonationAlerts) во все поля
        const chats = {
            1: "" + window.location.hostname,
            2: "" + window.location.hostname,
            3: "",
            4: "" + window.location.hostname,
            5: "" + window.location.hostname,
            6: "" + window.location.hostname
        };

        // Логика переключения матчей и чатов
        function switchMatch(matchNum) {
            // Меняем видео в плеере
            document.getElementById('player').src = streams[matchNum];
            // Меняем чат в окне чата
            document.getElementById('chatIframe').src = chats[matchNum];

            // Делаем активной только нажатую кнопку
            const buttons = document.querySelectorAll('.match-btn');
            buttons.forEach((btn, index) => {
                if (index === (matchNum - 1)) {
                    btn.classList.add('active'); // Кнопка горит красным
                } else {
                    btn.classList.remove('active'); // Остальные кнопки серые
                }
            });
        }

        // При первой загрузке страницы автоматически включится МАТЧ 1
        window.onload = function() {
            switchMatch(1);
        };
    </script>
</body>
</html>
